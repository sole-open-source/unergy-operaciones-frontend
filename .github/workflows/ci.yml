name: CI

# Valida que las actualizaciones de dependencias (incluidas las generadas por
# Renovate) no rompan el build. Sirve como condicion de "checks en verde" para
# el auto-merge de Renovate en actualizaciones patch/minor.
on:
  push:
    branches: [master]
  pull_request:

# Evita ejecuciones duplicadas en pushes consecutivos a la misma rama/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
